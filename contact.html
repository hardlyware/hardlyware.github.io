<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Contact – HARDlyWARE</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a href="index.html" class="brand">
        <img src="images/logo-square.png" alt="HARDlyWARE logo" class="brand-logo">
        <span class="brand-text">HARDlyWARE</span>
      </a>

      <nav class="main-nav">
        <a href="index.html" class="nav-link">Home</a>
        <a href="about.html" class="nav-link">About</a>
        <a href="contact.html" class="nav-link active">Contact</a>
      </nav>

      <div class="header-right">
        <button id="theme-toggle" class="theme-toggle" aria-label="Toggle dark/light mode">
          <span class="theme-icon theme-icon-dark"><i class="fa-solid fa-moon"></i></span>
          <span class="theme-icon theme-icon-light"><i class="fa-solid fa-sun"></i></span>
        </button>
      </div>
    </div>
  </header>

  <main>
    <section class="section">
      <div class="container narrow">
        <h1>Contact</h1>
        <p>
          For questions about projects, collaborations, or modules:
        </p>
        <p>
          <a href="mailto:youremail@example.com" class="highlight-link">youremail@example.com</a>
        </p>
        <p>
          You can also follow and reach out via:
        </p>
        <div class="hero-socials">
          <a href="https://instagram.com/your_instagram" target="_blank" rel="noopener" class="social-btn">
            <i class="fa-brands fa-instagram"></i>
          </a>
          <a href="https://youtube.com/@your_youtube" target="_blank" rel="noopener" class="social-btn">
            <i class="fa-brands fa-youtube"></i>
          </a>
          <a href="https://github.com/your_github" target="_blank" rel="noopener" class="social-btn">
            <i class="fa-brands fa-github"></i>
          </a>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <div class="footer-left">
        <span>© <span id="year"></span> HARDlyWARE</span>
      </div>
      <div class="footer-center">
        <a href="mailto:youremail@example.com" class="footer-email">youremail@example.com</a>
      </div>
      <div class="footer-right">
        <a href="https://instagram.com/your_instagram" target="_blank" rel="noopener" class="social-btn small">
          <i class="fa-brands fa-instagram"></i>
        </a>
        <a href="https://youtube.com/@your_youtube" target="_blank" rel="noopener" class="social-btn small">
          <i class="fa-brands fa-youtube"></i>
        </a>
        <a href="https://github.com/your_github" target="_blank" rel="noopener" class="social-btn small">
          <i class="fa-brands fa-github"></i>
        </a>
      </div>
    </div>
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
